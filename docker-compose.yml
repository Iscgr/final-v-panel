# Docker Compose configuration for MarFaNet
services:
  # Main Application
  app:
    image: final-v-panel-app
    build: .
    container_name: marfanet-app
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    networks:
      - marfanet-network
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/marfanet
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    command: ["npm","run","start:prod"]

  # PostgreSQL Database
  db:
    image: postgres:14
    container_name: marfanet-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marfanet
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - marfanet-network

  # Redis for session storage
  redis:
    image: redis:alpine
    container_name: marfanet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - marfanet-network

volumes:
  postgres-data:
  redis-data:

networks:
  marfanet-network:
    driver: bridge
